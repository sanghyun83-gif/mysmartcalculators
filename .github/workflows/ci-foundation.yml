name: CI Foundation Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  foundation-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Search sync gate
        run: npm run audit:search

      - name: Structure gate
        run: npm run qa:structure
