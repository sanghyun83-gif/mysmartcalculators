# AI Agent Coding Guideline (short):
# 1) Keep changes minimal and scoped to the task.
# 2) Do not modify existing Caddy/FastAPI services unless explicitly requested.
# 3) Validate build and deployment steps before restart.
# 4) Never use sudo in workflows.
# 5) Prefer safe, reversible operations and clear logs.

name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-mysmartcalculators-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and restart app on Mac mini
    runs-on: [self-hosted, macmini, mysmartcalculators, deploy]
    timeout-minutes: 30
    env:
      APP_DIR: /Users/dyoomhee/websites/hammy/mysmartcalculators
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Deploy from fixed app dir
        run: |
          set -euo pipefail
          git -C "$APP_DIR" fetch origin main
          git -C "$APP_DIR" reset --hard "$GITHUB_SHA"
          cd "$APP_DIR"
          npm ci
          npm run build

      - name: Restart Next.js launch agent
        run: |
          launchctl kickstart -k gui/$(id -u)/com.mysmartcalculators.next

      - name: Verify app is responding
        run: |
          set -euo pipefail
          for i in {1..15}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3100/ || true)
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ] || [ "$code" = "403" ]; then
              echo "App responded with HTTP $code"
              exit 0
            fi
            echo "Waiting for app... ($i/15)"
            sleep 2
          done
          echo "App did not respond in time"
          exit 1
